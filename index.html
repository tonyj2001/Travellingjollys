function deletePost(pid){
  const p = findPost(pid);
  if(!p) return;
  if(!confirm(`Delete "${p.title}"? This can't be undone (unless you have a backup export).`)) return;
  POSTS = POSTS.filter(x => x.pid !== pid);
  savePosts(POSTS);
  render();
}

function openModal(pid){
  const p = findPost(pid);
  if(!p) return;
  const photosHtml = p.images.length
    ? `<div class="modal-photos">${p.images.map(src=>`<img src="${src}">`).join('')}</div>`
    : '';
  modalContent.innerHTML = `
    <button class="modal-close" id="modalCloseBtn">✕</button>
    ${photosHtml}
    <div class="modal-body">
      <div class="loc-chips" style="margin-bottom:10px;">${p.location.map(l=>`<span class="loc-chip">${l}</span>`).join('')}</div>
      <h2>${p.title}</h2>
      <div class="cat-chips" style="margin-bottom:14px;">${p.categories.map(c=>`<span class="cat-chip ${c}">${c}</span>`).join('')}</div>
      <div class="modal-content-text">${p.content}</div>
      ${p.link ? `<a class="modal-link" href="${p.link}" target="_blank">View original post ↗</a>` : ''}
    </div>
  `;
  modalOverlay.classList.add('open');
  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
}
function closeModal(){ modalOverlay.classList.remove('open'); }
modalOverlay.addEventListener('click', e => { if(e.target === modalOverlay) closeModal(); });

// ---------- ADD / EDIT FORM ----------
function openForm(pid){
  const editing = !!pid;
  const p = editing ? findPost(pid) : {title:'',date:new Date().toISOString().slice(0,10),location:[],categories:[],content:'',images:[],link:''};

  modalContent.innerHTML = `
    <button class="modal-close" id="modalCloseBtn">✕</button>
    <div class="modal-body">
      <h2>${editing ? 'Edit Trip' : 'Add a Trip'}</h2>
      <div class="form-grid">
        <div class="form-row">
          <label>Title</label>
          <input type="text" id="f_title" value="${p.title.replace(/"/g,'&quot;')}" placeholder="e.g. Weekend in Savannah">
        </div>
        <div class="form-two-col">
          <div class="form-row">
            <label>Date</label>
            <input type="date" id="f_date" value="${p.date}">
          </div>
          <div class="form-row">
            <label>Location(s)</label>
            <input type="text" id="f_location" value="${p.location.join(', ')}" placeholder="Savannah, GA">
            <div class="hint">Comma-separated if more than one stop</div>
          </div>
        </div>
        <div class="form-row">
          <label>Categories</label>
          <div class="form-cat-check">
            <label><input type="checkbox" value="Hotels" ${p.categories.includes('Hotels')?'checked':''}> Hotels</label>
            <label><input type="checkbox" value="Eats" ${p.categories.includes('Eats')?'checked':''}> Eats</label>
            <label><input type="checkbox" value="Entertainment" ${p.categories.includes('Entertainment')?'checked':''}> Entertainment</label>
          </div>
        </div>
        <div class="form-row">
          <label>Notes</label>
          <textarea id="f_content" placeholder="Where you stayed, what you ate, what you did...">${p.content}</textarea>
        </div>
        <div class="form-row">
          <label>Photo URLs</label>
          <input type="text" id="f_images" value="${p.images.join(', ')}" placeholder="https://... , https://...">
          <div class="hint">Comma-separated image links</div>
        </div>
        <div class="form-row">
          <label>Source link (optional)</label>
          <input type="text" id="f_link" value="${p.link || ''}" placeholder="https://...">
        </div>
        <div class="form-actions">
          <button class="admin-btn secondary" id="cancelFormBtn">Cancel</button>
          <button class="admin-btn" id="saveFormBtn">${editing ? 'Save Changes' : 'Add Trip'}</button>
        </div>
      </div>
    </div>
  `;
  modalOverlay.classList.add('open');
  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
  document.getElementById('cancelFormBtn').addEventListener('click', closeModal);
  document.getElementById('saveFormBtn').addEventListener('click', () => {
    const title = document.getElementById('f_title').value.trim();
    const date = document.getElementById('f_date').value;
    if(!title || !date){ alert('Title and date are required.'); return; }
    const location = document.getElementById('f_location').value.split(',').map(s=>s.trim()).filter(Boolean);
    const categories = [...modalContent.querySelectorAll('.form-cat-check input:checked')].map(c=>c.value);
    const content = document.getElementById('f_content').value.trim();
    const images = document.getElementById('f_images').value.split(',').map(s=>s.trim()).filter(Boolean);
    const link = document.getElementById('f_link').value.trim();

    if(editing){
      Object.assign(p, {title, date, location, categories, content, images, link});
    } else {
      const pid = `${date}-${title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')}-${Date.now()}`;
      POSTS.push({pid, title, date, location, categories, content, images, link});
    }
    savePosts(POSTS);
    closeModal();
    render();
  });
}

addTripBtn.addEventListener('click', () => openForm(null));

// ---------- EXPORT / IMPORT ----------
exportBtn.addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(POSTS, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `travelingjollys-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
});
importBtn.addEventListener('click', () => importFile.click());
importFile.addEventListener('change', () => {
  const file = importFile.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if(!Array.isArray(data)) throw new Error('not an array');
      if(!confirm(`Import ${data.length} trips? This replaces everything currently on this page.`)) return;
      POSTS = data;
      savePosts(POSTS);
      render();
    } catch(e){
      alert('That file doesn\'t look like a valid trip export.');
    }
  };
  reader.readAsText(file);
  importFile.value = '';
});

catToggles.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const cat = btn.dataset.cat;
    if(activeCats.has(cat)){ activeCats.delete(cat); btn.classList.remove('active'); }
    else { activeCats.add(cat); btn.classList.add('active'); }
    render();
  });
});
locationFilter.addEventListener('change', () => { activeLocation = locationFilter.value; render(); });
searchInput.addEventListener('input', () => { searchTerm = searchInput.value; render(); });

render();
</script>
</body>
</html>
