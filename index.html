<html lang="en">
<head>
<meta charset="UTF-8">
<title>Traveling Jollys</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#24272b;
    background-image:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.04), transparent 40%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    font-family:'Inter',sans-serif;
    color:#f1ece0;
    padding:20px;
  }
  .gate{
    background:#f1ece0;
    color:#24272b;
    border-radius:10px;
    padding:38px 34px;
    max-width:380px;
    width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    border-top:6px solid #e8b23c;
  }
  .gate h1{
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:1px;
    font-size:24px;
    margin:0 0 6px;
  }
  .gate p.sub{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:#7a7469;
    margin:0 0 24px;
  }
  .gate input{
    width:100%;
    padding:12px 14px;
    border:2px solid #24272b;
    border-radius:5px;
    font-size:15px;
    margin-bottom:14px;
  }
  .gate button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:5px;
    background:#24272b;
    color:#f1ece0;
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:0.5px;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
  }
  .gate button:disabled{opacity:0.6;cursor:default;}
  .error{
    color:#b23b3b;
    font-size:13px;
    margin-top:-4px;
    margin-bottom:14px;
    min-height:16px;
    font-family:'Inter',sans-serif;
  }
</style>
</head>
<body>

<div class="gate">
  <h1>Traveling Jollys</h1>
  <p class="sub">// ENTER PASSWORD TO VIEW TRIP LOG //</p>
  <form id="gateForm">
    <input type="password" id="pw" autocomplete="off" autofocus placeholder="Password">
    <div class="error" id="err"></div>
    <button type="submit" id="submitBtn">Unlock</button>
  </form>
</div>

function b64ToBytes(b64){
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function deriveKey(password, saltBytes, iterations){
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    'raw', enc.encode(password), {name:'PBKDF2'}, false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:saltBytes, iterations:iterations, hash:'SHA-256'},
    baseKey,
    {name:'AES-GCM', length:256},
    false,
    ['decrypt']
  );
}

async function tryUnlock(password){
  const saltBytes = b64ToBytes(PAYLOAD.salt);
  const ivBytes = b64ToBytes(PAYLOAD.iv);
  const ctBytes = b64ToBytes(PAYLOAD.ciphertext);
  const key = await deriveKey(password, saltBytes, PAYLOAD.iterations);
  const plainBuf = await crypto.subtle.decrypt({name:'AES-GCM', iv:ivBytes}, key, ctBytes);
  return new TextDecoder().decode(plainBuf);
}

const form = document.getElementById('gateForm');
const pwInput = document.getElementById('pw');
const errEl = document.getElementById('err');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.textContent = '';
  submitBtn.disabled = true;
  submitBtn.textContent = 'Checking...';
  try {
    const enteredPassword = pwInput.value;
    let html = await tryUnlock(enteredPassword);
    html = html.replace('<head>', `<head>\n<script>window.__SITE_PW__ = ${JSON.stringify(enteredPassword)};<\/script>`);
    document.open();
    document.write(html);
    document.close();
  } catch(err){
    errEl.textContent = 'Wrong password. Try again.';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Unlock';
    pwInput.value = '';
    pwInput.focus();
  }
});
